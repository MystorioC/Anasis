<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>I'm Sorry</title>
</head>
<body id="truth-body">

    <div id="overlay">
        <h1>CLICK TO WITNESS</h1>
    </div>

    <div class="video-container">
        <video id="bgVideo" autoplay loop muted playsinline class="background-clip">
            <source src="An.mp4" type="video/mp4">
        </video>

        <audio id="truthAudio" loop>
            <source src="truth_bg.mp3" type="audio/mpeg">
        </audio>

        <div class="content">
            <h2 id="dialogue-text"></h2>
            <div id="link-wrapper" class="hidden">
                <a href="YOU.html" class="link-you">YOU.</a>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const audio = document.getElementById('truthAudio');
        const textElement = document.getElementById('dialogue-text');
        const linkWrapper = document.getElementById('link-wrapper');
        const body = document.getElementById('truth-body');

        const dialogue = [
            "Do not despair and be patient.",
            "He is trying to hide it from you.",
            "I will show you what lies beneath.",
            "Just look."
        ];

        let index = 0;

        overlay.addEventListener('click', (e) => {
            e.stopPropagation();
            // Start the background MP3
            audio.volume = 0.2; // Set volume to 20%
            audio.play();
            
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                showNextLine(); 
            }, 500);
        });

        body.addEventListener('click', () => {
            if (overlay.style.display === 'none') {
                if (index < dialogue.length) {
                    showNextLine();
                } else {
                    textElement.style.display = 'none';
                    linkWrapper.classList.remove('hidden');
                }
            }
        });

        function showNextLine() {
            textElement.style.opacity = '0';
            setTimeout(() => {
                textElement.innerText = dialogue[index];
                textElement.style.opacity = '1';
                index++;
            }, 400);
        }
    </script>
</body>
</html>
