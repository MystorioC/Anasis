<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>You?</title>
</head>
<body id="you-body">

    <div id="entry-button">
        <h1>STILL HERE?</h1>
    </div>

    <audio id="bgNoise" loop>
        <source src="downloads/noise.mp3" type="audio/mpeg">
    </audio>

    <div id="dialogue-container">
        <h1 id="active-text"></h1>
    </div>

    <script>
        const entryBtn = document.getElementById('entry-button');
        const audio = document.getElementById('bgNoise');
        const textElement = document.getElementById('active-text');
        const body = document.getElementById('you-body');
        
        const dialogue = [
            "there is nothing for you here.",
            "why do you keep looking?",
            "some things are better left hidden.",
            "There used to be more here, but I got rid of it. Now just leave, forget about me.",
            "",
            ""
        ];

        let index = 0;

        entryBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            audio.volume = 0.05;
            audio.play();
            entryBtn.style.opacity = '0';
            setTimeout(() => {
                entryBtn.style.display = 'none';
                showNextLine();
            }, 1000);
        });

        body.addEventListener('click', () => {
            if (entryBtn.style.display === 'none' && index < dialogue.length) {
                showNextLine();
            }
        });

        function showNextLine() {
            if (index < dialogue.length) {
                textElement.style.opacity = '0';
                setTimeout(() => {
                    textElement.innerText = dialogue[index];
                    if (dialogue[index] === "Turn Back") {
                        textElement.classList.add('imposing-red');
                    }
                    textElement.style.opacity = '1';
                    index++;
                }, 400);
            }
        }
    </script>
</body>
</html>
